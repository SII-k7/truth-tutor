<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truth Tutor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-container">
          <div id="ai-mascot" class="ai-mascot">
            <div class="mascot-body">
              <div class="mascot-face">
                <div class="mascot-eyes">
                  <div class="mascot-eye left"></div>
                  <div class="mascot-eye right"></div>
                </div>
                <div class="mascot-nose"></div>
                <div class="mascot-mouth"></div>
              </div>
              <div class="mascot-hat">
                <div class="hat-band"></div>
                <div class="hat-brim"></div>
              </div>
              <div class="mascot-pipe"></div>
            </div>
            <div class="mascot-thinking" id="mascot-thinking">
              <div class="thinking-bubble">
                <span class="thinking-dot"></span>
                <span class="thinking-dot"></span>
                <span class="thinking-dot"></span>
              </div>
            </div>
          </div>
          <span class="brand">Truth Tutor</span>
        </div>

        <div class="control-cluster">
          <div class="control-group">
            <span class="control-label">功能</span>
            <div class="segmented" data-target="mode">
              <button type="button" class="seg-btn active" data-value="paper-reading">Paper</button>
              <button type="button" class="seg-btn" data-value="alphaxiv">alphaXiv</button>
              <button type="button" class="seg-btn" data-value="general">General</button>
            </div>
            <select id="mode" class="hidden-native">
              <option value="paper-reading" selected>paper-reading</option>
              <option value="alphaxiv">alphaxiv</option>
              <option value="general">general</option>
            </select>
          </div>

          <div class="control-group">
            <span class="control-label">对话风格</span>
            <div class="segmented" data-target="strictness">
              <button type="button" class="seg-btn" data-value="soft">soft</button>
              <button type="button" class="seg-btn active" data-value="direct">direct</button>
              <button type="button" class="seg-btn" data-value="strict">strict</button>
              <button type="button" class="seg-btn" data-value="brutal">brutal</button>
            </div>
            <select id="strictness" class="hidden-native">
              <option value="soft">soft</option>
              <option value="direct" selected>direct</option>
              <option value="strict">strict</option>
              <option value="brutal">brutal</option>
            </select>
          </div>
        </div>
      </header>

      <main class="workspace">
        <section class="viewer-panel">
          <div class="paper-search-shell">
            <input id="paper-search" class="paper-search-input" placeholder="Search arXiv by paper title…" />
            <div id="paper-results" class="paper-results hidden"></div>
          </div>

          <div id="paper-caption" class="paper-caption">No paper loaded</div>
          <iframe id="pdf-frame" title="Paper PDF preview"></iframe>
          <div id="pdf-empty" class="empty-view visible">
            <div class="empty-copy">输入论文标题搜索 arXiv，或者在右侧直接贴 arXiv / PDF 链接。</div>
          </div>
        </section>

        <section class="chat-panel">
          <div id="chat-thread" class="chat-thread">
            <div id="empty-thread" class="empty-thread">Paste a paper link or search a paper title, then tell me exactly where you are stuck.</div>
          </div>

          <div class="composer">
            <textarea id="confusion" rows="8" placeholder="直接说你哪里没懂。Enter 发送，Shift+Enter 换行。"></textarea>
            <div class="composer-bar">
              <span id="status-text" class="status-text"></span>
              <button id="run-diagnosis" class="send-btn">Send</button>
            </div>
          </div>
        </section>
      </main>

      <div hidden>
        <input id="topic" />
        <input id="paperTitle" />
        <input id="paperId" />
        <input id="paperUrl" />
        <input id="paperDomain" />
        <input id="paperStage" />
        <input id="confusionLocation" />
        <input id="mainBlocker" />
        <input id="studyLevel" />
        <input id="weeklyHours" />
        <input id="goals" />
        <textarea id="currentUnderstanding"></textarea>
        <textarea id="extraContext"></textarea>
        <textarea id="userQuestion"></textarea>
        <textarea id="aiAnswer"></textarea>
        <textarea id="userReaction"></textarea>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
