<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truth Tutor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-container">
          <div id="ai-mascot" class="ai-mascot">
            <div class="mascot-scene">
              <div class="mascot-head-3d">
                <!-- Simple wireframe face -->
                <svg class="wireframe-face" viewBox="0 0 48 52" fill="none">
                  <!-- Head outline -->
                  <ellipse cx="24" cy="28" rx="18" ry="20" stroke="#2a2e3c" stroke-width="1.5" fill="none"/>
                  <!-- Glasses -->
                  <rect x="8" y="22" width="12" height="8" rx="2" stroke="#2a2e3c" stroke-width="1.5" fill="none"/>
                  <rect x="28" y="22" width="12" height="8" rx="2" stroke="#2a2e3c" stroke-width="1.5" fill="none"/>
                  <line x1="20" y1="26" x2="28" y2="26" stroke="#2a2e3c" stroke-width="1.5"/>
                  <!-- Eyes dots -->
                  <circle cx="14" cy="26" r="2" fill="#2a2e3c"/>
                  <circle cx="34" cy="26" r="2" fill="#2a2e3c"/>
                  <!-- Nose -->
                  <line x1="24" y1="28" x2="24" y2="32" stroke="#2a2e3c" stroke-width="1.5"/>
                  <!-- Mouth -->
                  <path d="M18 38 Q24 42 30 38" stroke="#2a2e3c" stroke-width="1.5" fill="none"/>
                  <!-- Hat - deerstalker -->
                  <path d="M6 18 Q4 8 12 6 L24 4 L36 6 Q44 8 42 18" stroke="#2a2e3c" stroke-width="1.5" fill="none"/>
                  <line x1="8" y1="14" x2="6" y2="20" stroke="#2a2e3c" stroke-width="1.5"/>
                  <line x1="40" y1="14" x2="42" y2="20" stroke="#2a2e3c" stroke-width="1.5"/>
                  <line x1="6" y1="18" x2="42" y2="18" stroke="#2a2e3c" stroke-width="1.5"/>
                </svg>
              </div>
            </div>
            <div class="mascot-thinking" id="mascot-thinking">
              <div class="thinking-bubble">
                <span class="thinking-dot"></span>
                <span class="thinking-dot"></span>
                <span class="thinking-dot"></span>
              </div>
            </div>
          </div>
          <span class="brand">Truth Tutor</span>
        </div>

        <div class="topbar-search">
          <input id="paper-search" class="topbar-search-input" placeholder="搜索 arXiv 论文标题…" autocomplete="off" />
          <div id="paper-results" class="paper-results hidden"></div>
        </div>

        <div class="nav-links" style="display:flex;gap:8px;align-items:center;">
          <a href="/dashboard.html" style="padding:6px 12px;background:var(--surface);border-radius:8px;text-decoration:none;color:#10b981;font-size:12px;font-weight:600;">📊 Dashboard</a>
          <a href="/library.html" style="padding:6px 12px;background:var(--surface);border-radius:8px;text-decoration:none;color:#6366f1;font-size:12px;font-weight:600;">🎯 Drills</a>
          <a href="/compare.html" style="padding:6px 12px;background:var(--surface);border-radius:8px;text-decoration:none;color:#f5576c;font-size:12px;font-weight:600;">🎭 Compare</a>
          <button id="dark-mode-toggle" title="切换深色模式 (Ctrl+D)" style="padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;">🌙</button>
        </div>

        <div class="control-cluster">
          <div class="control-group">
            <span class="control-label">功能</span>
            <div class="segmented" data-target="mode">
              <button type="button" class="seg-btn active" data-value="paper-reading">Paper</button>
              <button type="button" class="seg-btn" data-value="alphaxiv">alphaXiv</button>
              <button type="button" class="seg-btn" data-value="general">General</button>
            </div>
            <select id="mode" class="hidden-native">
              <option value="paper-reading" selected>paper-reading</option>
              <option value="alphaxiv">alphaxiv</option>
              <option value="general">general</option>
            </select>
          </div>

          <div class="control-group">
            <span class="control-label">对话风格</span>
            <div class="segmented" data-target="strictness">
              <button type="button" class="seg-btn" data-value="soft">soft</button>
              <button type="button" class="seg-btn active" data-value="direct">direct</button>
              <button type="button" class="seg-btn" data-value="strict">strict</button>
              <button type="button" class="seg-btn" data-value="brutal">brutal</button>
            </div>
            <select id="strictness" class="hidden-native">
              <option value="soft">soft</option>
              <option value="direct" selected>direct</option>
              <option value="strict">strict</option>
              <option value="brutal">brutal</option>
            </select>
          </div>
        </div>
      </header>

      <main class="workspace">
        <section class="viewer-panel">
          <div id="paper-caption" class="paper-caption">No paper loaded</div>
          <iframe id="pdf-frame" title="Paper PDF preview"></iframe>
          <div id="pdf-empty" class="empty-view visible">
            <div class="empty-copy">搜索上方论文标题，或在右侧直接贴 arXiv / PDF 链接。</div>
          </div>
        </section>

        <section class="chat-panel">
          <div id="chat-thread" class="chat-thread">
            <div id="empty-thread" class="empty-thread">Paste a paper link or search a paper title, then tell me exactly where you are stuck.</div>
          </div>

          <div class="composer">
            <textarea id="confusion" rows="3" placeholder="直接说你哪里没懂。Enter 发送，Shift+Enter 换行。"></textarea>
            <div class="composer-bar">
              <span id="status-text" class="status-text"></span>
              <button id="run-diagnosis" class="send-btn">Send</button>
            </div>
        </section>
      </main>

      <div hidden>
        <input id="topic" />
        <input id="paperTitle" />
        <input id="paperId" />
        <input id="paperUrl" />
        <input id="paperDomain" />
        <input id="paperStage" />
        <input id="confusionLocation" />
        <input id="mainBlocker" />
        <input id="studyLevel" />
        <input id="weeklyHours" />
        <input id="goals" />
        <textarea id="currentUnderstanding"></textarea>
        <textarea id="extraContext"></textarea>
        <textarea id="userQuestion"></textarea>
        <textarea id="aiAnswer"></textarea>
        <textarea id="userReaction"></textarea>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
